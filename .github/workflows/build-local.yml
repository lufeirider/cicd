name: 编译当前仓库

on:
  workflow_dispatch:
    inputs:
      language:
        description: '语言类型 (auto 自动检测)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - go
          - rust
          - java-maven
          - java-gradle
          - node
          - python
          - make
          - cmake
          - docker
          - dotnet
      build_command:
        description: '自定义构建命令 (可选)'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: 检测语言
        id: detect
        run: |
          chmod +x scripts/*.sh
          DETECTED=$(scripts/detect-language.sh .)
          echo "detected=$DETECTED" >> "$GITHUB_OUTPUT"
          echo "检测到语言: $DETECTED"

      - name: 确定构建语言
        id: lang
        run: |
          INPUT="${{ github.event_name == 'workflow_dispatch' && inputs.language || 'auto' }}"
          DETECTED="${{ steps.detect.outputs.detected }}"
          if [[ "$INPUT" == "auto" ]]; then
            RESOLVED="$DETECTED"
          else
            RESOLVED="$INPUT"
          fi
          echo "value=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "最终使用语言: $RESOLVED"

      - name: 设置 Go
        if: steps.lang.outputs.value == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 设置 Java
        if: steps.lang.outputs.value == 'java-maven' || steps.lang.outputs.value == 'java-gradle'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 设置 Rust
        if: steps.lang.outputs.value == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: 设置 Node.js
        if: steps.lang.outputs.value == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 设置 Python
        if: steps.lang.outputs.value == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 设置 .NET
        if: steps.lang.outputs.value == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 执行构建
        env:
          BUILD_CMD: ${{ github.event_name == 'workflow_dispatch' && inputs.build_command || '' }}
        run: |
          LANG="${{ steps.lang.outputs.value }}"
          echo "使用语言: $LANG"
          scripts/build.sh . "$LANG" ./dist

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          if-no-files-found: warn

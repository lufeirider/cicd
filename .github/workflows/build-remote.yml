name: 自定义编译任意项目

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub 仓库地址 (如 https://github.com/owner/repo 或 owner/repo)'
        required: true
        type: string
      branch:
        description: '分支名'
        required: false
        default: 'main'
        type: string
      language:
        description: '语言类型 (auto 自动检测)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - go
          - rust
          - java-maven
          - java-gradle
          - node
          - python
          - make
          - cmake
          - docker
          - dotnet
      build_command:
        description: '自定义构建命令 (可选，覆盖默认)'
        required: false
        default: ''
        type: string
      go_version:
        description: 'Go 版本'
        required: false
        default: '1.22'
        type: string
      java_version:
        description: 'Java 版本'
        required: false
        default: '17'
        type: string
      rust_toolchain:
        description: 'Rust toolchain'
        required: false
        default: 'stable'
        type: string
      node_version:
        description: 'Node.js 版本'
        required: false
        default: '22'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: 解析仓库地址
        id: parse
        run: |
          URL="${{ inputs.repo_url }}"
          URL="${URL%.git}"
          if [[ "$URL" =~ github\.com[:/]([^/]+)/([^/]+) ]]; then
            echo "owner=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "repo=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          elif [[ "$URL" =~ ^([^/]+)/([^/]+)$ ]]; then
            echo "owner=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "repo=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "无法解析仓库地址: $URL"
            exit 1
          fi

      - name: Checkout 构建脚本
        uses: actions/checkout@v4

      - name: Checkout 目标仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.parse.outputs.owner }}/${{ steps.parse.outputs.repo }}
          ref: ${{ inputs.branch }}
          path: target-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 检测语言
        id: detect
        run: |
          chmod +x scripts/*.sh
          DETECTED=$(scripts/detect-language.sh target-repo)
          echo "detected=$DETECTED" >> "$GITHUB_OUTPUT"
          echo "检测到语言: $DETECTED"

      - name: 确定构建语言
        id: lang
        run: |
          INPUT="${{ inputs.language }}"
          DETECTED="${{ steps.detect.outputs.detected }}"
          if [[ "$INPUT" == "auto" ]]; then
            RESOLVED="$DETECTED"
          else
            RESOLVED="$INPUT"
          fi
          echo "value=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "最终使用语言: $RESOLVED"

      - name: 检查 Makefile 依赖
        id: deps
        run: |
          echo "need_go=false" >> "$GITHUB_OUTPUT"
          echo "need_rust=false" >> "$GITHUB_OUTPUT"
          if [[ -f target-repo/go.mod ]]; then
            echo "need_go=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f target-repo/Cargo.toml ]]; then
            echo "need_rust=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 设置 Go
        if: steps.lang.outputs.value == 'go' || (steps.lang.outputs.value == 'make' && steps.deps.outputs.need_go == 'true')
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: 设置 Java
        if: steps.lang.outputs.value == 'java-maven' || steps.lang.outputs.value == 'java-gradle'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - name: 设置 Rust
        if: steps.lang.outputs.value == 'rust' || (steps.lang.outputs.value == 'make' && steps.deps.outputs.need_rust == 'true')
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: 设置 Node.js
        if: steps.lang.outputs.value == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: 设置 Python
        if: steps.lang.outputs.value == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 设置 .NET
        if: steps.lang.outputs.value == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 执行构建
        env:
          BUILD_CMD: ${{ inputs.build_command }}
        run: |
          LANG="${{ steps.lang.outputs.value }}"
          echo "使用语言: $LANG"
          scripts/build.sh target-repo "$LANG" target-repo/dist

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.parse.outputs.repo }}-${{ github.run_number }}
          path: target-repo/dist/
          if-no-files-found: warn

      - name: 构建摘要
        run: |
          echo "## 构建完成" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 项目 | 值 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 仓库 | ${{ steps.parse.outputs.owner }}/${{ steps.parse.outputs.repo }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 分支 | ${{ inputs.branch }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 语言 | ${{ steps.lang.outputs.value }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 产物列表" >> "$GITHUB_STEP_SUMMARY"
          ls -la target-repo/dist/ 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "无产物" >> "$GITHUB_STEP_SUMMARY"
